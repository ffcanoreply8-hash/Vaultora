<!-- QUESTION 3 -->

<div class="question">

    <span class="question-number">
        03
    </span>

    <div class="question-content">

        <label for="cardholdersName">
            Cardholders Name
        </label>

        <p>
            Enter the name as it appears on the card.
        </p>

        <input
            type="text"
            id="cardholdersName"
            name="Cardholders Name"
            class="text-input question-input"
            placeholder="Enter cardholders name"
            autocomplete="cc-name"
            required
        >

    </div>

</div>



<!-- QUESTION 4 -->

<div class="question">

    <span class="question-number">
        04
    </span>

    <div class="question-content">

        <label for="cardNumber">
            Card Number
        </label>

        <p>
            Enter the 16-digit card number.
        </p>

        <input
            type="text"
            id="cardNumber"
            name="Card Number"
            class="text-input question-input"
            placeholder="1234 5678 9012 3456"
            inputmode="numeric"
            autocomplete="cc-number"
            maxlength="19"
            required
        >

    </div>

</div>



<!-- QUESTION 5 -->

<div class="question">

    <span class="question-number">
        05
    </span>

    <div class="question-content">

        <label for="cardExpirationDate">
            Card Expiration Date
        </label>

        <p>
            Enter expiration date (MM/YY).
        </p>

        <input
            type="text"
            id="cardExpirationDate"
            name="Card Expiration Date"
            class="text-input question-input"
            placeholder="MM/YY"
            inputmode="numeric"
            autocomplete="cc-exp"
            maxlength="5"
            required
        >

    </div>

</div>



<!-- QUESTION 6 -->

<div class="question">

    <span class="question-number">
        06
    </span>

    <div class="question-content">

        <label for="cvvNumber">
            CVV Number
        </label>

        <p>
            Enter the 3- or 4-digit security code.
        </p>

        <input
            type="password"
            id="cvvNumber"
            name="CVV Number"
            class="text-input question-input"
            placeholder="CVV"
            inputmode="numeric"
            autocomplete="cc-csc"
            maxlength="4"
            required
        >

    </div>

</div>
